<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <style>
        body { font-family: Arial, sans-serif; background:#f0f2f5; padding:40px; }
        .form-box { background:#fff; padding:20px; max-width:400px; margin:auto; border-radius:8px; box-shadow:0 0 5px rgba(0,0,0,0.1); }
        label { display:block; margin-top:10px; }
        input { width:100%; padding:8px; margin-top:5px; }
        button { margin-top:20px; padding:10px; background:#28a745; color:white; border:none; border-radius:4px; cursor:pointer; }
        button:hover { background:#1e7e34; }
        a { display:block; margin-top:15px; text-align:center; color:#007bff; text-decoration:none; }
    </style>
</head>
<body>
    <div class="form-box">
        <h2>Lecturer Login</h2>
        {% if error %}
        <p style="color: red; font-weight: bold;">{{ error }}</p>
        {% endif %}


        <form method="post" action="/login">
            <label>Email</label>
            <input type="email" name="email" required>
            <label>Password</label>
            <input type="password" name="password" required>
            <button type="submit">Login</button>
            <p>
            <a href="/forgot-password">
            <button type="button">Forgot Password?</button>
            </a>
            </p>

        </form>
        <a href="/signup">Don't have an account? Signup</a>
    </div>
</body>
</html>
