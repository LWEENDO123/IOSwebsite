<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Boarding House Detail</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    :root {
      --accent: #66D4FF;
      --text: #222;
      --muted: #666;
      --shadow: 0 2px 8px rgba(0,0,0,0.08);
      --radius: 14px;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f7f8fa;
      color: var(--text);
    }

    .app-bar {
      background: var(--accent);
      color: white;
      padding: 16px;
      font-size: 18px;
      font-weight: bold;
      text-align: center;
    }

    .container {
      max-width: 480px;
      margin: auto;
      padding: 14px;
    }

    h2 {
      margin-bottom: 4px;
    }

    .location {
      color: var(--muted);
      font-size: 14px;
      margin-top: 0;
    }

    /* =========================
       SLIDER
    ========================= */
    .slider {
      position: relative;
      width: 100%;
      height: 280px;
      overflow: hidden;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      background: #ddd;
    }

    .slider-track {
      display: flex;
      height: 100%;
      transition: transform 0.35s ease;
    }

    .slide {
      min-width: 100%;
      height: 100%;
      flex-shrink: 0;
    }

    .slide img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .nav-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      border: none;
      background: rgba(0,0,0,0.4);
      color: white;
      font-size: 22px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
      z-index: 10;
    }

    .prev {
      left: 10px;
    }

    .next {
      right: 10px;
    }

    /* Actions */
    .actions {
      display: flex;
      justify-content: space-around;
      margin: 16px 0;
    }

    .action-icon {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      border: none;
      background: white;
      box-shadow: var(--shadow);
      cursor: pointer;
    }

    .action-icon img {
      width: 26px;
      height: 26px;
    }

    .card {
      background: white;
      padding: 14px;
      margin-top: 14px;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }
  </style>
</head>
<body>

<header class="app-bar">Boarding House Detail</header>

<main class="container">

  <h2 id="listingTitle"></h2>
  <p class="location"></p>

  <!-- SLIDER -->
  <div class="slider">
    <button class="nav-btn prev" id="prevBtn">&#10094;</button>

    <div id="imageSlider" class="slider-track"></div>

    <button class="nav-btn next" id="nextBtn">&#10095;</button>
  </div>

  <!-- ACTIONS -->
  <div class="actions">
    <button id="phoneBtn" class="action-icon">
      <img src="/static/assets/icons/phone-call.png">
    </button>

    <button id="googleBtn" class="action-icon">
      <img src="/static/assets/icons/direction.png">
    </button>

    <button id="yangoBtn" class="action-icon">
      <img src="/static/assets/icons/yango.png">
    </button>

    <button id="arrivalBtn" class="action-icon">
      <img src="/static/assets/icons/bus.png">
    </button>
  </div>

  <div class="card">
    <h3>Space Overview</h3>
    <div class="space-description"></div>
  </div>

  <div class="card">
    <h3>Conditions</h3>
    <div class="conditions"></div>
  </div>

</main>

<script type="module" src="/static/javascript/detail.js"></script>
</body>
</html>
