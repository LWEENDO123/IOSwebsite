<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Kleno Boarding Houses</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

  <!-- CSS -->
  <link rel="stylesheet" href="/static/css/style.css">

  <!-- JS as ES module -->
  <script type="module" src="/static/javascript/homepage.js"></script>
</head>
<body>
  <header class="brand-header">
    <div class="menu">☰</div>
    <h1>KLENO Boarding Houses</h1>
    <select id="universitySelect">
      <option value="">My University</option>
      <option value="CUZM">Cavendish Main Campus</option>
      <option value="CUZMED">Cavendish Medical Campus</option>
      <option value="UNILUSM">UNILUS Main Campus</option>
      <option value="CHRESO">Chreso University</option>
      <option value="UNZAM">UNZA Main Campus</option>
    </select>
  </header>

  <div class="filters">
    <button class="filter active" data-filter="all">All</button>
    <button class="filter" data-filter="new">New</button>
  </div>

  <div class="title">
    <h2>Listings</h2>
  </div>

  <main id="houseList" class="house-list"><!-- populated by JS --></main>

  <div id="loader" class="loader">Loading...</div>
</body>
</html>
