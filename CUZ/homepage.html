<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Kleno Boarding Houses</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

  <!-- Inline CSS -->
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #fff;
    }

    .brand-header {
      background: #66D4FF;
      color: white;
      padding: 12px;
      text-align: center;
    }

    .filters {
      display: flex;
      gap: 8px;
      padding: 12px;
    }

    .filter {
      padding: 6px 12px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      background: #f0f0f0;
    }

    .filter.active {
      background: #66D4FF;
      color: white;
    }

    .title {
      padding: 12px;
    }

    .house-list {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      padding: 12px;
    }

    .loader {
      text-align: center;
      padding: 20px;
      font-weight: bold;
    }
  </style>

  <!-- JS as ES module -->
  <script type="module" src="/static/javascript/homepage.js"></script>
</head>
<body>
  <header class="brand-header">
    <div class="menu">☰</div>
    <h1>KLENO Boarding Houses</h1>
    <select id="universitySelect">
      <option value="">My University</option>
      <option value="CUZM">Cavendish Main Campus</option>
      <option value="CUZMED">Cavendish Medical Campus</option>
      <option value="UNILUSM">UNILUS Main Campus</option>
      <option value="CHRESO">Chreso University</option>
      <option value="UNZAM">UNZA Main Campus</option>
    </select>
  </header>

  <div class="filters">
    <button class="filter active" data-filter="all">All</button>
    <button class="filter" data-filter="new">New</button>
  </div>

  <div class="title">
    <h2>Listings</h2>
  </div>

  <main id="houseList" class="house-list"><!-- populated by JS --></main>

  <div id="loader" class="loader">Loading...</div>
</body>
</html>
