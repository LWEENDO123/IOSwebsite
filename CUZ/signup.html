<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Kleno Signup</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
      background: #fff;
      color: #222;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 400px;
      margin: 40px auto;
      padding: 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.2);
      border-radius: 10px;
      background: #fff;
    }

    .brand {
      font-size: 32px;
      color: #66D4FF;
      font-weight: bold;
      text-align: center;
      margin-bottom: 10px;
    }

    .subtitle {
      text-align: center;
      font-size: 16px;
      margin-bottom: 20px;
    }

    .form-group {
      margin-bottom: 15px;
      display: flex;
      flex-direction: column;
    }

    label {
      font-size: 14px;
      margin-bottom: 5px;
    }

    input, select {
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
    }

    .password-group {
      display: flex;
      align-items: center;
    }

    .password-group input {
      flex: 1;
    }

    .toggle-btn {
      margin-left: 8px;
      padding: 8px 12px;
      border: none;
      background: #66D4FF;
      color: white;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
    }

    #signupBtn {
      width: 100%;
      padding: 12px;
      background: #66D4FF;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    #signupBtn:disabled {
      background: #999;
      cursor: not-allowed;
    }

    .message {
      text-align: center;
      margin: 10px 0;
      font-size: 14px;
    }

    .message.success { color: green; }
    .message.error { color: red; }

    .login-link {
      text-align: center;
      margin-top: 15px;
    }

    .spinner {
      border: 2px solid #fff;
      border-top: 2px solid #66D4FF;
      border-radius: 50%;
      width: 16px;
      height: 16px;
      display: inline-block;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="brand">KLENO</h1>
    <h2 class="subtitle">Create your account</h2>

    <form id="signupForm">
      <div class="form-group">
        <label for="first_name">First Name</label>
        <input type="text" id="first_name" name="first_name" required minlength="2" maxlength="15" pattern="[A-Za-z ]+">
      </div>

      <div class="form-group">
        <label for="last_name">Last Name</label>
        <input type="text" id="last_name" name="last_name" required minlength="2" maxlength="15" pattern="[A-Za-z ]+">
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required>
      </div>

      <div class="form-group password-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required minlength="8" maxlength="64">
        <button type="button" id="togglePassword" class="toggle-btn">Show</button>
      </div>

      <div class="form-group">
        <label for="phone_number">Phone Number</label>
        <input type="tel" id="phone_number" name="phone_number" required pattern="[0-9]{7,15}">
      </div>

      <div class="form-group">
        <label for="university">University</label>
        <select id="university" name="university" required>
          <option value="">Choose University</option>
          <option value="CUZM">Cavendish Main Campus</option>
          <option value="CUZMED">Cavendish Medical Campus</option>
          <option value="UNILUSM">UNILUS Main Campus</option>
          <option value="CHRESO">Chreso University</option>
          <option value="UNZA">UNZA Main Campus</option>
        </select>
      </div>

      <p id="message" class="message"></p>

      <button type="submit" id="signupBtn">Sign Up</button>
    </form>

    <p class="login-link">
      Already have an account? <a href="login.html">Login</a>
    </p>
  </div>

  <!-- Correct JS path -->
  <script src="../javascript/static/signup.js"></script>
  <script>
    const togglePassword = document.getElementById("togglePassword");
    const passwordInput = document.getElementById("password");
    togglePassword.addEventListener("click", () => {
      const type = passwordInput.getAttribute("type") === "password" ? "text" : "password";
      passwordInput.setAttribute("type", type);
      togglePassword.textContent = type === "password" ? "Show" : "Hide";
    });
  </script>
</body>
</html>
